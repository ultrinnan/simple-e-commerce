version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simpl_backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://api.simpl-e-commerce.fedirko.pro
      RUN_MIGRATIONS: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_database:/var/www/html/database
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.simpl-be.rule=Host(`api.simpl-e-commerce.fedirko.pro`)"
      - "traefik.http.routers.simpl-be.entrypoints=websecure"
      - "traefik.http.routers.simpl-be.tls.certresolver=le"
      - "traefik.http.services.simpl-be.loadbalancer.server.port=80"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass your API URL to React during build time
        VITE_API_BASE_URL: https://api.simpl-e-commerce.fedirko.pro
    container_name: simpl_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.simpl-fe.rule=Host(`simpl-e-commerce.fedirko.pro`)"
      - "traefik.http.routers.simpl-fe.entrypoints=websecure"
      - "traefik.http.routers.simpl-fe.tls.certresolver=le"
      - "traefik.http.services.simpl-fe.loadbalancer.server.port=80"

volumes:
  backend_storage:
  backend_database:

networks:
  default:
  traefik-public:
    external: true